<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RotaSeca | Contato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topo">
    <div class="container topo__conteudo">
      <a class="logo" href="index.html"><img src="img/Cloud Image.png" alt="Rota Seca" class="logo__img"><span class="logo__ro">Rota</span><span class="logo__se">Seca</span></a>
      <button type="button" class="menu-toggle" aria-label="Abrir menu" aria-controls="menuNav" aria-expanded="false" id="menuToggle">☰</button>
      <nav class="menu" id="menuNav">
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre</a>
        <a href="solucao.html">Solução</a>
        <a href="integrantes.html">Integrantes</a>
        <a href="faq.html">FAQ</a>
        <a href="contato.html" class="botao botao--claro">Contato</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="pagina-intro">
      <div class="container">
        <h1>Contato</h1>
        <p>Envie uma mensagem para saber mais sobre o projeto e receber atualizações.</p>
      </div>
    </section>

    <section class="texto container contato">
      <form id="contatoForm">
        <div class="campo">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" name="nome" required>
        </div>
        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="campo">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" required>
        </div>
        <div class="campo">
          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem" rows="6" required></textarea>
        </div>
        <button class="botao" type="submit">Enviar mensagem</button>
        <p class="form__sucesso" id="formSucesso"></p>
      </form>
    </section>
  </main>
  
  <script src="js/script.js"></script>
</body>
</html>
